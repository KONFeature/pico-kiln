<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <title>Kiln App Icon</title>
  <!-- Concept: "The Glowing Kiln" - A modern, front-loading ceramics kiln revealing intense, white-hot internal heat. The dark silhouette of a classic vase contrasts against the radial heat glow, emphasizing the core function of the app. -->
  
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="kiln-bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a30"/>
      <stop offset="100%" stop-color="#141418"/>
    </linearGradient>

    <!-- Kiln Body Gradient -->
    <linearGradient id="kiln-body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a44"/>
      <stop offset="100%" stop-color="#222228"/>
    </linearGradient>

    <!-- Intense Radial Heat Glow -->
    <radialGradient id="kiln-glow-grad" cx="50%" cy="75%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="15%" stop-color="#fef08a"/>
      <stop offset="30%" stop-color="#fde047"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="80%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </radialGradient>

    <!-- Blur Filters -->
    <filter id="kiln-ambient-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="kiln-coil-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="kiln-shadow-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- App Icon Background (Squircle) -->
  <rect width="512" height="512" rx="112" fill="url(#kiln-bg-grad)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.05"/>

  <!-- Ambient Heat Glow (Bleeding into the room) -->
  <circle cx="256" cy="250" r="180" fill="#ef4444" filter="url(#kiln-ambient-blur)" opacity="0.35"/>

  <!-- Drop Shadow under the Kiln -->
  <ellipse cx="256" cy="410" rx="140" ry="12" fill="#000000" opacity="0.5" filter="url(#kiln-shadow-blur)"/>

  <!-- Kiln Outer Body -->
  <path d="M 150 410 L 362 410 A 24 24 0 0 0 386 386 L 386 250 A 130 130 0 0 0 126 250 L 126 386 A 24 24 0 0 0 150 410 Z" fill="url(#kiln-body-grad)" stroke="#4a4a56" stroke-width="4"/>

  <!-- Kiln Inner Chamber (The Firebox) -->
  <path d="M 166 360 L 346 360 A 16 16 0 0 0 362 344 L 362 250 A 106 106 0 0 0 150 250 L 150 344 A 16 16 0 0 0 166 360 Z" fill="url(#kiln-glow-grad)"/>
  
  <!-- Inner Chamber Rim Highlight -->
  <path d="M 166 360 L 346 360 A 16 16 0 0 0 362 344 L 362 250 A 106 106 0 0 0 150 250 L 150 344 A 16 16 0 0 0 166 360 Z" fill="none" stroke="#ef4444" stroke-width="4" opacity="0.6"/>

  <!-- Electric Heating Coils (SSR controlled) -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8" filter="url(#kiln-coil-blur)">
    <!-- Left Coils -->
    <path d="M 150 320 L 174 320"/>
    <path d="M 150 270 L 182 270"/>
    <path d="M 155 220 L 187 220"/>
    <!-- Right Coils -->
    <path d="M 362 320 L 338 320"/>
    <path d="M 362 270 L 330 270"/>
    <path d="M 357 220 L 325 220"/>
  </g>

  <!-- Kiln Shelf -->
  <rect x="134" y="344" width="244" height="16" rx="4" fill="#111113"/>

  <!-- Pottery Silhouette (Vase) -->
  <path d="M 232 344 C 232 320, 200 300, 208 250 C 214 210, 236 200, 236 184 L 230 184 L 230 176 L 282 176 L 282 184 L 276 184 C 276 200, 298 210, 304 250 C 312 300, 280 320, 280 344 Z" fill="#111113"/>

  <!-- Heat Sparks / Shimmer -->
  <g filter="url(#kiln-coil-blur)">
    <circle cx="236" cy="160" r="3" fill="#f97316"/>
    <circle cx="266" cy="180" r="4" fill="#eab308"/>
    <circle cx="250" cy="150" r="2" fill="#ef4444"/>
  </g>

  <!-- Control Panel (Pico / Tech interface) -->
  <rect x="176" y="372" width="160" height="24" rx="12" fill="#111113"/>
  
  <!-- Status Indicators -->
  <circle cx="196" cy="384" r="6" fill="#ef4444"/> <!-- Heating -->
  <circle cx="216" cy="384" r="6" fill="#f97316"/> <!-- SSR Output -->
  <circle cx="236" cy="384" r="6" fill="#3b82f6"/> <!-- Cooling -->
  
  <!-- Digital Display -->
  <rect x="266" y="376" width="50" height="16" rx="4" fill="#1c1c20"/>
  <rect x="270" y="380" width="42" height="8" rx="2" fill="#eab308"/>
</svg>
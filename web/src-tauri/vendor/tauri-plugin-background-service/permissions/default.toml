"$schema" = "schemas/schema.json"

[default]
description = "Default permissions for the background service plugin"
# NOTE (vendored): the desktop-service OS-service permissions
# (allow-install-service, allow-*-os-service, ...) are intentionally omitted.
# Those commands are gated behind the `desktop-service` feature (off here), so
# their permission definitions aren't generated on Android/desktop and would
# fail ACL resolution (SetPermissionNotFound). This app doesn't use them.
permissions = [
    "allow-start",
    "allow-stop",
    "allow-is-running",
    "allow-get-service-state",
    "allow-get-platform-capabilities",
    "allow-enable-auto-restart",
    "allow-disable-auto-restart",
    "allow-get-desired-service-state",
    "allow-validate-setup",
]

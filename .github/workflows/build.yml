name: 'app'

on:
  push:
    tags:
      - 'app-*'
  workflow_dispatch:

# Serialize releases on the same ref; don't cancel an in-flight release build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Build jobs only produce workflow artifacts -> read is enough.
# The final `release` job elevates to `contents: write` to publish the release.
permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Desktop (macOS arm64 / x64 / universal, Linux, Windows)
  # tauri-action runs in BUILD-ONLY mode (no tagName/releaseId), exposing the
  # built bundles via the `artifactPaths` output. We stage those and upload them
  # as a workflow artifact; the `release` job collects everything at the end.
  # ---------------------------------------------------------------------------
  build-desktop:
    name: 'Desktop (${{ matrix.name }})'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - name: macos-x86_64
            platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - name: macos-universal
            platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - name: linux
            platform: 'ubuntu-22.04'
            args: ''
          - name: windows
            platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/app-')
        run: |
          VERSION="${GITHUB_REF_NAME#app-}"
          VERSION="${VERSION#v}"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' web/src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" web/src-tauri/tauri.conf.json
          echo "Synced tauri.conf.json version to $VERSION"

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './web/src-tauri -> target'
          key: ${{ matrix.name }}

      - name: Install frontend dependencies
        run: bun install
        working-directory: ./web

      - name: Build Tauri app (build-only, no release)
        uses: tauri-apps/tauri-action@v0.6
        with:
          projectPath: ./web
          args: ${{ matrix.args }}

      - name: Stage desktop artifacts
        # find (forward-slash paths) instead of tauri-action's `artifactPaths`:
        # that output is backslash paths on Windows, which Git Bash can't stat.
        run: |
          mkdir -p dist-artifacts
          find web/src-tauri/target -type f -path '*/release/bundle/*' \
            \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.deb' \
               -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.msi' \
               -o -name '*.exe' \) \
            -exec cp {} dist-artifacts/ \;
          ls -la dist-artifacts

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.name }}
          path: dist-artifacts/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Android (APK + AAB) -> workflow artifact `android`
  # ---------------------------------------------------------------------------
  build-android:
    name: 'Android'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/app-')
        run: |
          VERSION="${GITHUB_REF_NAME#app-}"
          VERSION="${VERSION#v}"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' web/src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" web/src-tauri/tauri.conf.json
          echo "Synced tauri.conf.json version to $VERSION"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './web/src-tauri -> target'
          key: android

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;26.1.10909125" "build-tools;34.0.0" "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install
        working-directory: ./web

      - name: Build frontend
        run: bun run build
        working-directory: ./web

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked

      - name: Initialize Tauri Android
        run: |
          cd web
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      - name: Setup Android signing
        run: |
          cd web/src-tauri/gen/android
          if [ -n "${{ secrets.ANDROID_KEY_BASE64 }}" ]; then
            echo "Setting up Android signing..."
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
            echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
            base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > "$RUNNER_TEMP/keystore.jks"
            echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties
          else
            echo "Skipping Android signing - secrets not configured"
          fi

      - name: Build Android APK/AAB
        run: |
          cd web
          cargo tauri android build --ci
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Stage Android artifacts
        run: |
          mkdir -p dist-artifacts
          find web/src-tauri/gen/android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) -exec cp {} dist-artifacts/ \;
          ls -la dist-artifacts

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android
          path: dist-artifacts/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # iOS (best-effort, UNSIGNED) -> workflow artifact `ios` only.
  # No Apple signing is configured, so this cannot produce a distributable IPA.
  # The whole job is `continue-on-error` and is intentionally NOT a dependency
  # of `release`, so it can never block a desktop+android release.
  # To ship real IPAs later, wire up App Store Connect signing secrets here.
  # ---------------------------------------------------------------------------
  build-ios:
    name: 'iOS (best-effort, unsigned)'
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/app-')
        run: |
          VERSION="${GITHUB_REF_NAME#app-}"
          VERSION="${VERSION#v}"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' web/src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" web/src-tauri/tauri.conf.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './web/src-tauri -> target'
          key: ios

      - name: Install iOS targets
        run: |
          rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install
        working-directory: ./web

      - name: Build frontend
        run: bun run build
        working-directory: ./web

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked

      - name: Initialize Tauri iOS
        run: |
          cd web
          if [ ! -d "src-tauri/gen/apple" ]; then
            cargo tauri ios init
          fi

      - name: Build iOS app (unsigned)
        run: |
          cd web
          cargo tauri ios build --ci || echo "iOS build needs code signing for a distributable IPA"

      - name: Stage iOS artifacts
        run: |
          mkdir -p dist-artifacts
          find web/src-tauri/gen/apple -type f -name '*.ipa' -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find web/src-tauri/gen/apple -type d -name '*.app' -exec cp -R {} dist-artifacts/ \; 2>/dev/null || true
          ls -la dist-artifacts || true

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ios
          path: dist-artifacts/*
          if-no-files-found: warn
          retention-days: 7

  # always() + empty-guard => non-blocking: a draft release is cut from whatever
  # desktop+android artifacts exist (>=1), even if some targets failed. iOS excluded.
  release:
    name: 'GitHub Release'
    needs: [build-desktop, build-android]
    if: ${{ always() && startsWith(github.ref, 'refs/tags/app-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: release-assets

      - name: Collect release files
        id: collect
        run: |
          mkdir -p release-files
          find release-assets -type f \( -path '*/desktop-*/*' -o -path '*/android/*' \) \
            -exec cp {} release-files/ \; 2>/dev/null || true
          count=$(find release-files -type f | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Collected $count release asset(s):"
          ls -la release-files || true

      - name: Create / update GitHub release
        if: steps.collect.outputs.count != '0'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Kiln App ${{ github.ref_name }}'
          body: 'See the assets to download this version and install.'
          draft: true
          prerelease: false
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Firmware build config. Applies only when cargo is invoked from inside
# `kiln-firmware/` (config is discovered from the working directory, not the
# manifest path), so it never leaks into the host workspace build run from
# `rust/`. Build the flashable image with:
#
#     cd kiln-firmware && cargo build --release
#
# Flashing/running needs an external tool (probe-rs or picotool); wire a
# `runner` here once one is available, e.g.:
#     runner = "probe-rs run --chip RP235x"

[build]
target = "thumbv8m.main-none-eabihf"

[target.thumbv8m.main-none-eabihf]
rustflags = [
    # cortex-m-rt's linker script (pulls in memory.x, provided by build.rs).
    "-C", "link-arg=-Tlink.x",
    # Keep sections page-aligned without rounding region sizes up to a power of
    # two — required for the RP2350 flash layout.
    "-C", "link-arg=--nmagic",
]
